# OverBuild — 单一 Compose 配置
# 开发：docker compose up -d --build
# 生产（宝塔）：docker compose up -d --build  + 宝塔 Nginx 反代（见 README）
# 生产（无宝塔备选）：docker compose --profile prod up -d --build
# 数据目录：.env 中设置 DATA_DIR（默认 ./data）

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: overbuild
      POSTGRES_PASSWORD: overbuild
      POSTGRES_DB: overbuild
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overbuild -d overbuild"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://overbuild:overbuild@db:5432/overbuild?schema=public&client_encoding=UTF8
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      DEEPL_AUTH_KEY: ${DEEPL_AUTH_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      API_PORT: 3001
      API_URL: http://api:3001
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ${DATA_DIR:-./data}/uploads:/app/apps/api/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"

  nginx:
    profiles: [prod]
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/overbuild-docker.conf:/etc/nginx/conf.d/default.conf:ro
