# OverBuild — Nginx reverse proxy (production)
# Place in /etc/nginx/sites-available/overbuild and symlink to sites-enabled.

upstream overbuild_web {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream overbuild_api {
  server 127.0.0.1:3001;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 100m;

  # API (NestJS global prefix: /api/v1)
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://overbuild_api;
  }

  # Swagger docs
  location /api/docs {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://overbuild_api;
  }

  # Next.js frontend
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://overbuild_web;
  }
}
